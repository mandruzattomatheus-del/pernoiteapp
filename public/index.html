<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mercam - Controle de Horários</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    .senha-wrap { position: relative; }
    .senha-wrap input { width: 100%; padding-right: 40px; }
    .senha-wrap .btn-olho {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      line-height: 1;
    }
  </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="loginScreen" style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:#0a0a0a;">
  <div style="width:100%; max-width:360px; padding:24px;">
    <div style="text-align:center; margin-bottom:32px;">
      <div style="font-family:'Syne', sans-serif; font-size:28px; font-weight:800; letter-spacing:0.12em; color:#f0f0f0; margin-bottom:8px;">MERCAM</div>
      <p style="color:#888; font-size:11px; letter-spacing:0.2em; font-family:'Syne', sans-serif;">CONTROLE DE HORÁRIOS</p>
    </div>
    <div style="background:#1a1a1a; border:1px solid #2a2a2a; padding:28px; border-radius:4px; position:relative;">
      <div style="position:absolute; top:0; left:0; width:40px; height:2px; background:#e8ff00;"></div>
      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:11px; color:#666; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; font-family:monospace;">Usuário</label>
        <input id="loginUsername" type="text" placeholder="ex: bruno.meira" autocomplete="username"
          style="width:100%; background:#111; border:1px solid #2a2a2a; color:#f0f0f0; padding:11px 14px; font-size:14px; outline:none; border-radius:2px; font-family:monospace;"
          onfocus="this.style.borderColor='#e8ff00'" onblur="this.style.borderColor='#2a2a2a'"/>
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:block; font-size:11px; color:#666; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; font-family:monospace;">Senha</label>
        <div class="senha-wrap">
          <input id="loginSenha" type="password" placeholder="••••••••" autocomplete="current-password"
            style="background:#111; border:1px solid #2a2a2a; color:#f0f0f0; padding:11px 14px; font-size:14px; outline:none; border-radius:2px; font-family:monospace;"
            onfocus="this.style.borderColor='#e8ff00'" onblur="this.style.borderColor='#2a2a2a'"/>
          <button type="button" class="btn-olho" onclick="toggleSenha('loginSenha', this)">👁</button>
        </div>
      </div>
      <button onclick="fazerLogin()"
        style="width:100%; background:#e8ff00; color:#000; border:none; padding:13px; font-weight:700; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; border-radius:2px;">
        ENTRAR
      </button>
      <div id="loginErro" style="display:none; margin-top:12px; color:#ff3b3b; font-size:12px; font-family:monospace; text-align:center;"></div>
    </div>
    <p style="text-align:center; margin-top:16px; font-size:11px; color:#444; font-family:monospace;">
      Problemas para acessar? Fale com o seu gestor.
    </p>
  </div>
</div>

<!-- TELA DE TROCA DE SENHA -->
<div id="trocaSenhaScreen" style="display:none; align-items:center; justify-content:center; min-height:100vh; background:#0a0a0a;">
  <div style="width:100%; max-width:360px; padding:24px;">
    <div style="text-align:center; margin-bottom:32px;">
      <div style="font-family:'Syne', sans-serif; font-size:28px; font-weight:800; letter-spacing:0.12em; color:#f0f0f0; margin-bottom:8px;">MERCAM</div>
      <p style="color:#888; font-size:11px; letter-spacing:0.2em; font-family:'Syne', sans-serif;">CONTROLE DE HORÁRIOS</p>
    </div>
    <div style="background:#1a1a1a; border:1px solid #2a2a2a; padding:28px; border-radius:4px; position:relative;">
      <div style="position:absolute; top:0; left:0; width:40px; height:2px; background:#e8ff00;"></div>

      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:11px; color:#666; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; font-family:monospace;">Senha Atual</label>
        <div class="senha-wrap">
          <input id="senhaAtual" type="password" placeholder="••••••••"
            style="background:#111; border:1px solid #2a2a2a; color:#f0f0f0; padding:11px 14px; font-size:14px; outline:none; border-radius:2px; font-family:monospace;"
            onfocus="this.style.borderColor='#e8ff00'" onblur="this.style.borderColor='#2a2a2a'"/>
          <button type="button" class="btn-olho" onclick="toggleSenha('senhaAtual', this)">👁</button>
        </div>
      </div>

      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:11px; color:#666; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; font-family:monospace;">Nova Senha</label>
        <div class="senha-wrap">
          <input id="novaSenha" type="password" placeholder="••••••••"
            style="background:#111; border:1px solid #2a2a2a; color:#f0f0f0; padding:11px 14px; font-size:14px; outline:none; border-radius:2px; font-family:monospace;"
            onfocus="this.style.borderColor='#e8ff00'" onblur="this.style.borderColor='#2a2a2a'"/>
          <button type="button" class="btn-olho" onclick="toggleSenha('novaSenha', this)">👁</button>
        </div>
      </div>

      <div style="margin-bottom:20px;">
        <label style="display:block; font-size:11px; color:#666; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; font-family:monospace;">Confirmar Nova Senha</label>
        <div class="senha-wrap">
          <input id="confirmarSenha" type="password" placeholder="••••••••"
            style="background:#111; border:1px solid #2a2a2a; color:#f0f0f0; padding:11px 14px; font-size:14px; outline:none; border-radius:2px; font-family:monospace;"
            onfocus="this.style.borderColor='#e8ff00'" onblur="this.style.borderColor='#2a2a2a'"/>
          <button type="button" class="btn-olho" onclick="toggleSenha('confirmarSenha', this)">👁</button>
        </div>
      </div>

      <button onclick="trocarSenha()"
        style="width:100%; background:#e8ff00; color:#000; border:none; padding:13px; font-weight:700; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; border-radius:2px; margin-bottom:10px;">
        SALVAR NOVA SENHA
      </button>
      <button onclick="voltarLogin()"
        style="width:100%; background:transparent; color:#666; border:1px solid #2a2a2a; padding:11px; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; border-radius:2px;">
        CANCELAR
      </button>
      <div id="trocaErro"    style="display:none; margin-top:12px; color:#ff3b3b; font-size:12px; font-family:monospace; text-align:center;"></div>
      <div id="trocaSucesso" style="display:none; margin-top:12px; color:#00ff88; font-size:12px; font-family:monospace; text-align:center;"></div>
    </div>
  </div>
</div>

<div class="container">
  <div id="userBar" style="display:none; justify-content:space-between; align-items:center; margin-bottom:16px; padding:10px 14px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:4px;">
    <div>
      <div id="userNome" style="font-size:13px; color:#f0f0f0; font-family:monospace;"></div>
      <div id="userFuncao" style="font-size:10px; color:#666; font-family:monospace; letter-spacing:0.1em; text-transform:uppercase; margin-top:2px;"></div>
    </div>
    <div style="display:flex; gap:8px;">
      <button onclick="mostrarTrocaSenha()"
        style="background:transparent; border:1px solid #2a2a2a; color:#888; padding:5px 12px; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; font-family:monospace;">
        Trocar Senha
      </button>
      <button onclick="fazerLogout()"
        style="background:transparent; border:1px solid #2a2a2a; color:#888; padding:5px 12px; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; font-family:monospace;">
        Sair
      </button>
    </div>
  </div>

  <div class="logo-area">
    <div style="font-family:'Syne', sans-serif; font-size:26px; font-weight:800; letter-spacing:0.12em; color:#f0f0f0;">MERCAM</div>
    <div style="font-family:'Syne', sans-serif; font-size:11px; letter-spacing:0.2em; color:#666; text-transform:uppercase; margin-top:4px;">Controle de Horários</div>
  </div>

  <form id="formPernoite" novalidate>
    <select id="funcao" name="funcao_usuario" required style="display:none;">
      <option value="">Selecione sua função</option>
      <option value="motorista">Motorista</option>
      <option value="ajudante">Ajudante</option>
    </select>

    <hr>

    <div id="resto" hidden>
      <div id="areaMotorista" class="hidden-section" aria-hidden="true">
        <label for="nomeMotorista">Nome do Motorista *</label>
        <select id="nomeMotorista" name="nome_motorista" data-required disabled>
          <option value="">Selecione o motorista</option>
          <option>Alexandro Aymore de Oliveira Santos</option>
          <option>Alvaro Aparecido de Oliveira Benedito</option>
          <option>Bruno da Silva Meira</option>
          <option>Cleiton Gonzaga de Queiroga</option>
          <option>Eder Antonio Henrique</option>
          <option>Jean Carlos Rodrigues do Nascimento</option>
          <option>Jonas Santana dos Santos</option>
          <option>Jose Clayton da Silva Rodrigues</option>
          <option>Jose Crispin Vieira de Araujo</option>
          <option>Leandro Caraciolo dos Santos</option>
          <option>Lucas Guedes da Silva</option>
          <option>Nelson José Teixeira Miranda</option>
          <option>Wagner da Silva Peres Amaral</option>
          <option>Wilson de Souza</option>
        </select>

        <label for="temAjudante">Estava com ajudante?</label>
        <select id="temAjudante" name="tem_ajudante" disabled>
          <option value="">Selecione...</option>
          <option value="nao">Não</option>
          <option value="sim">Sim</option>
        </select>

        <div id="blocoAjudanteDoMotorista" class="hidden-section" aria-hidden="true">
          <label for="ajudanteDoMotorista">Selecione o Ajudante</label>
          <select id="ajudanteDoMotorista" name="ajudante_do_motorista" disabled>
            <option value="">Selecione o ajudante</option>
            <option>Airton Linhares</option>
            <option>Cosme Jose de Oliveira</option>
            <option>Damião Francisco Pereira</option>
            <option>Francisco das Chagas Pimentel Junior</option>
            <option>Francisco Rodrigues do Nascimento</option>
            <option>Leonardo Andrade da Silva</option>
            <option>Marcos Baracho do Nascimento</option>
            <option>Nivaldo de Barros</option>
            <option>Elias Borges de Macedo</option>
          </select>
        </div>
      </div>

      <div id="areaAjudante" class="hidden-section" aria-hidden="true">
        <label for="nomeAjudante">Seu Nome (Ajudante) *</label>
        <select id="nomeAjudante" name="nome_ajudante" data-required disabled>
          <option value="">Selecione seu nome</option>
          <option>Airton Linhares</option>
          <option>Cosme Jose de Oliveira</option>
          <option>Damião Francisco Pereira</option>
          <option>Francisco das Chagas Pimentel Junior</option>
          <option>Francisco Rodrigues do Nascimento</option>
          <option>Leonardo Andrade da Silva</option>
          <option>Marcos Baracho do Nascimento</option>
          <option>Nivaldo de Barros</option>
          <option>Elias Borges de Macedo</option>
        </select>

        <label for="motoristaResponsavel">Motorista com quem estava *</label>
        <select id="motoristaResponsavel" name="motorista_responsavel" data-required disabled>
          <option value="">Selecione o motorista</option>
          <option>Alexandro Aymore de Oliveira Santos</option>
          <option>Alvaro Aparecido de Oliveira Benedito</option>
          <option>Bruno da Silva Meira</option>
          <option>Cleiton Gonzaga de Queiroga</option>
          <option>Eder Antonio Henrique</option>
          <option>Jean Carlos Rodrigues do Nascimento</option>
          <option>Jonas Santana dos Santos</option>
          <option>Jose Clayton da Silva Rodrigues</option>
          <option>Jose Crispin Vieira de Araujo</option>
          <option>Leandro Caraciolo dos Santos</option>
          <option>Lucas Guedes da Silva</option>
          <option>Nelson José Teixeira Miranda</option>
          <option>Wagner da Silva Peres Amaral</option>
          <option>Wilson de Souza</option>
        </select>
      </div>

      <hr>

      <label for="emailColab">Digite seu email</label>
      <input id="emailColab" type="email" name="email" data-required disabled>

      <label for="dataRegistro">Data *</label>
      <input id="dataRegistro" type="date" name="data_registro" data-required disabled>

      <div class="horarios">
        <div>
          <label for="horaEntrada">Hora de Entrada *</label>
          <input id="horaEntrada" type="time" name="hora_entrada" data-required disabled>
        </div>
        <div>
          <label for="horaSaida">Hora de Saída *</label>
          <input id="horaSaida" type="time" name="hora_saida" data-required disabled>
        </div>
      </div>

      <div id="blocoPlaca" class="hidden-section" aria-hidden="true" hidden>
        <label for="placaSelect">Veículo / Placa *</label>
        <select id="placaSelect" name="placa" disabled required>
          <option value="">Selecionar veículo</option>
          <option>DPM-2C71 - AUDI Q5 SB P-HIBRIDO</option>
          <option>EWW-0A64 - AUDI Q5 SB P-HIBRIDO</option>
          <option>SUC-0C28 - BMW X6 M COMPETITION</option>
          <option>DEU-7390 - Carreta Sider</option>
          <option>FNV-4C67 - Carreta Sider</option>
          <option>FXC-4H07 - Fiat - Fiorino</option>
          <option>GGT-0F64 - GWM HAVAL H6 GT</option>
          <option>FXA-0D64 - Moto Honda X-ADV</option>
          <option>EOE-0B64 - Kia Carnival</option>
          <option>EOU-0G85 - Mercedes-Benz - Atego 3030</option>
          <option>FZA-4F15 - Mercedes-Benz - ACCELO</option>
          <option>DIZ-7H62 - M BENZ - SPRINTER</option>
          <option>GKD-7A62 - M BENZ - ATEGO 2430</option>
          <option>FUZ-0422 - Volvo - FH 460</option>
          <option>UFL-0H73 - Volvo FH 460 LS Branco</option>
          <option>UGO-4F96 - Volvo FH 460 LS Prata</option>
          <option>DTB-1E11 - VW - 24250</option>
          <option>EMU-6E18 - VW - 8.150</option>
          <option>FMT-0A64 - VW - 11.180</option>
          <option>FLQ-5F07 - VW - 19.330</option>
          <option>DTD-2A80 - VW - Kombi</option>
          <option>FRE-3H48 - VW-30.330 Bi-truck Sider</option>
          <option>GGE-3C94 - Truck Sider VW-24.330</option>
          <option>SVD-0D46 - VW Express Delivery Sider</option>
          <option>TLC-4I24 - VW Express Delivery Sider</option>
        </select>
      </div>

      <label for="romaneio">Romaneio / Ordem de Coleta *</label>
      <input id="romaneio" type="text" name="romaneio" data-required disabled>

      <label for="uf">UF *</label>
      <select id="uf" name="uf" data-required disabled>
        <option value="">Selecionar UF</option>
        <option value="AC">AC - Acre</option>
        <option value="AL">AL - Alagoas</option>
        <option value="AP">AP - Amapá</option>
        <option value="AM">AM - Amazonas</option>
        <option value="BA">BA - Bahia</option>
        <option value="CE">CE - Ceará</option>
        <option value="DF">DF - Distrito Federal</option>
        <option value="ES">ES - Espírito Santo</option>
        <option value="GO">GO - Goiás</option>
        <option value="MA">MA - Maranhão</option>
        <option value="MT">MT - Mato Grosso</option>
        <option value="MS">MS - Mato Grosso do Sul</option>
        <option value="MG">MG - Minas Gerais</option>
        <option value="PA">PA - Pará</option>
        <option value="PB">PB - Paraíba</option>
        <option value="PR">PR - Paraná</option>
        <option value="PE">PE - Pernambuco</option>
        <option value="PI">PI - Piauí</option>
        <option value="RJ">RJ - Rio de Janeiro</option>
        <option value="RN">RN - Rio Grande do Norte</option>
        <option value="RS">RS - Rio Grande do Sul</option>
        <option value="RO">RO - Rondônia</option>
        <option value="RR">RR - Roraima</option>
        <option value="SC">SC - Santa Catarina</option>
        <option value="SP">SP - São Paulo</option>
        <option value="SE">SE - Sergipe</option>
        <option value="TO">TO - Tocantins</option>
      </select>

      <label for="cidade">Cidade *</label>
      <select id="cidade" name="cidade" data-required disabled>
        <option value="">Selecione a UF primeiro</option>
      </select>

      <hr>

      <div class="checkbox-row">
        <input type="checkbox" id="pernoite" name="pernoite" class="custom-check" disabled>
        <label for="pernoite">Houve Pernoite?</label>
      </div>

      <div id="blocoValeDescarga" class="checkbox-row">
        <input type="checkbox" id="valeDescarga" name="vale_descarga" class="custom-check" disabled>
        <label for="valeDescarga">Vale Descarga?</label>
      </div>

      <button type="submit" disabled>Enviar Registro</button>
    </div>
  </form>
</div>

<!-- MODAL DUPLICIDADE -->
<div id="modalDuplicidade" style="display:none; position:fixed; inset:0; background:#000000cc; z-index:9999; align-items:center; justify-content:center; padding:20px;">
  <div style="background:#1a1a1a; border:1px solid #2a2a2a; padding:28px; width:100%; max-width:380px; border-radius:4px; position:relative;">
    <div style="position:absolute; top:0; left:0; width:40px; height:2px; background:#e8ff00;"></div>
    <div style="font-size:20px; margin-bottom:12px;">⚠️</div>
    <h3 style="font-family:'Syne',sans-serif; font-size:14px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:12px; color:#f0f0f0;">Registro Duplicado</h3>
    <p id="modalDuplicidadeMsg" style="font-size:13px; color:#888; line-height:1.6; margin-bottom:24px; font-family:monospace;"></p>
    <div style="display:flex; gap:10px;">
      <button id="modalDuplicidadeConfirmar"
        style="flex:1; background:#e8ff00; color:#000; border:none; padding:12px; font-family:'Syne',sans-serif; font-weight:700; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; border-radius:2px;">
        Enviar Mesmo Assim
      </button>
      <button id="modalDuplicidadeCancelar"
        style="flex:1; background:transparent; color:#888; border:1px solid #2a2a2a; padding:12px; font-family:'Syne',sans-serif; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; border-radius:2px;">
        Cancelar
      </button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
