<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mercam - Controle de Horários</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="container">
  <div class="logo-area">
    <img src="assets/logo-mercam2021.png" alt="Mercam">
    <h2>Controle de Horários</h2>
  </div>

  <form id="formPernoite" novalidate>
    <!-- PASSO 1: IDENTIFICAÇÃO -->
    <label for="funcao">Você é: *</label>
    <select id="funcao" name="funcao_usuario" required>
      <option value="">Selecione sua função</option>
      <option value="motorista">Motorista</option>
      <option value="ajudante">Ajudante</option>
    </select>

    <hr>

    <!-- TUDO A PARTIR DAQUI COMEÇA OCULTO -->
    <div id="resto" hidden>
      <!-- ÁREA DO MOTORISTA -->
      <div id="areaMotorista" class="hidden-section" aria-hidden="true">
        <label for="nomeMotorista">Nome do Motorista *</label>
        <select id="nomeMotorista" name="nome_motorista" data-required disabled>
            <option value="">Selecione o motorista</option>
            <option>Alexandro Aymore de Oliveira Santos</option>
            <option>Alvaro Aparecido de Oliveira Benedito</option>
            <option>Bruno da Silva Meira</option>
            <option>Cleiton Gonzaga de Queiroga</option>
            <option>Eder Antonio Henrique</option>
            <option>Jean Carlos Rodrigues do Nascimento</option>
            <option>Jonas Santana dos Santos</option>
            <option>Jose Clayton da Silva Rodrigues</option>
            <option>Jose Crispin Vieira de Araujo</option>
            <option>Leandro Caraciolo dos Santos</option>
            <option>Lucas Guedes da Silva</option>
            <option>Nelson José Teixeira Miranda</option>
            <option>Wagner da Silva Peres Amaral</option>
            <option>Wilson de Souza</option>
        </select>

        <label for="temAjudante">Estava com ajudante?</label>
        <select id="temAjudante" name="tem_ajudante" disabled>
          <option value="nao">Não</option>
          <option value="sim">Sim</option>
        </select>

        <div id="blocoAjudanteDoMotorista" class="hidden-section" aria-hidden="true">
          <label for="ajudanteDoMotorista">Selecione o Ajudante</label>
          <select id="ajudanteDoMotorista" name="ajudante_do_motorista" disabled>
            <option value="">Selecione o ajudante</option>
            <option>Airton Linhares</option>
            <option>Cosme Jose de Oliveira</option>
            <option>Damião Francisco Pereira</option>
            <option>Francisco das Chagas Pimentel Junior</option>
            <option>Francisco Rodrigues do Nascimento</option>
            <option>Leonardo Andrade da Silva</option>
            <option>Marcos Baracho do Nascimento</option>
            <option>Nivaldo de Barros</option>
            <option>Elias Borges de Macedo</option>
          </select>
        </div>
      </div>

      <!-- ÁREA DO AJUDANTE -->
      <div id="areaAjudante" class="hidden-section" aria-hidden="true">
        <label for="nomeAjudante">Seu Nome (Ajudante) *</label>
        <select id="nomeAjudante" name="nome_ajudante" data-required disabled>
          <option value="">Selecione seu nome</option>
          <option>Airton Linhares</option>
          <option>Cosme Jose de Oliveira</option>
          <option>Damião Francisco Pereira</option>
          <option>Francisco das Chagas Pimentel Junior</option>
          <option>Francisco Rodrigues do Nascimento</option>
          <option>Leonardo Andrade da Silva</option>
          <option>Marcos Baracho do Nascimento</option>
          <option>Nivaldo de Barros</option>
          <option>Elias Borges de Macedo</option>
        </select>

        <label for="motoristaResponsavel">Motorista com quem estava *</label>
        <select id="motoristaResponsavel" name="motorista_responsavel" data-required disabled>
          <option value="">Selecione o motorista</option>
          <option>Alexandro Aymore de Oliveira Santos</option>
          <option>Alvaro Aparecido de Oliveira Benedito</option>
          <option>Bruno da Silva Meira</option>
          <option>Cleiton Gonzaga de Queiroga</option>
          <option>Eder Antonio Henrique</option>
          <option>Jean Carlos Rodrigues do Nascimento</option>
          <option>Jonas Santana dos Santos</option>
          <option>Jose Clayton da Silva Rodrigues</option>
          <option>Jose Crispin Vieira de Araujo</option>
          <option>Leandro Caraciolo dos Santos</option>
          <option>Lucas Guedes da Silva</option>
          <option>Nelson José Teixeira Miranda</option>
          <option>Wagner da Silva Peres Amaral</option>
          <option>Wilson de Souza</option>
        </select>
      </div>

      <hr>

      <!-- DEMAIS CAMPOS GERAIS -->
      <label for="emailColab">Email do colaborador</label>
      <input id="emailColab" type="email" name="email" data-required disabled>

      <label for="dataRegistro">Data *</label>
      <input id="dataRegistro" type="date" name="data_registro" data-required disabled>

      <label for="romaneio">Romaneio / Ordem de Coleta *</label>
      <input id="romaneio" type="text" name="romaneio" data-required disabled>

      <label for="uf">UF *</label>
      <select id="uf" name="uf" data-required disabled>
        <option value="">Selecionar UF</option>
        <option value="AC">AC - Acre</option>
        <option value="AL">AL - Alagoas</option>
        <option value="AP">AP - Amapá</option>
        <option value="AM">AM - Amazonas</option>
        <option value="BA">BA - Bahia</option>
        <option value="CE">CE - Ceará</option>
        <option value="DF">DF - Distrito Federal</option>
        <option value="ES">ES - Espírito Santo</option>
        <option value="GO">GO - Goiás</option>
        <option value="MA">MA - Maranhão</option>
        <option value="MT">MT - Mato Grosso</option>
        <option value="MS">MS - Mato Grosso do Sul</option>
        <option value="MG">MG - Minas Gerais</option>
        <option value="PA">PA - Pará</option>
        <option value="PB">PB - Paraíba</option>
        <option value="PR">PR - Paraná</option>
        <option value="PE">PE - Pernambuco</option>
        <option value="PI">PI - Piauí</option>
        <option value="RJ">RJ - Rio de Janeiro</option>
        <option value="RN">RN - Rio Grande do Norte</option>
        <option value="RS">RS - Rio Grande do Sul</option>
        <option value="RO">RO - Rondônia</option>
        <option value="RR">RR - Roraima</option>
        <option value="SC">SC - Santa Catarina</option>
        <option value="SP">SP - São Paulo</option>
        <option value="SE">SE - Sergipe</option>
        <option value="TO">TO - Tocantins</option>
      </select>

      <label for="cidade">Cidade *</label>
      <select id="cidade" name="cidade" data-required disabled>
        <option value="">Selecione a UF primeiro</option>
      </select>

      <hr>

      <!-- CHECKBOXES (custom) -->
      <div class="checkbox-row">
        <input type="checkbox" id="pernoite" name="pernoite" class="custom-check" disabled>
        <label for="pernoite">Houve Pernoite?</label>
      </div>

      <div id="blocoValeDescarga" class="checkbox-row">
        <input type="checkbox" id="valeDescarga" name="vale_descarga" class="custom-check" disabled>
        <label for="valeDescarga">Trabalho foi Vale Descarga?</label>
      </div>

      <button type="submit" disabled>Enviar Registro</button>
    </div>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
